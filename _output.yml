bookdown::gitbook:
  css: style.css
  highlight: null
  config:
    toc:
      before: |
        <li><a href="./">Systems Ethology</a></li>
      after: |
        <li><a href="https://github.com/byandell/SystemsEthology" target="blank">Published with bookdown</a></li>
    edit: https://github.com/byandell/SystemsEthology/edit/master/%s
    download: ["pdf", "epub"]
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes
  highlight: null
bookdown::epub_book:
  highlight: null
bookdown::bs4_book:
  highlight: null
